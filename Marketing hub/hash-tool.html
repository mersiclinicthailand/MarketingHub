<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Password Hash Tool — Mersi Hub</title>
<style>
body{font-family:'Noto Sans Thai',system-ui,sans-serif;background:#F5F2EA;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#FFFEFA;border:1px solid rgba(194,163,105,.4);border-radius:16px;padding:36px;width:min(440px,92vw);box-shadow:0 18px 50px -18px rgba(27,35,29,.2)}
h1{font-size:18px;margin:0 0 6px;color:#23271F}
p{font-size:13px;color:#5A5F53;margin:0 0 20px}
input{width:100%;padding:12px 14px;border:1px solid rgba(35,39,31,.15);border-radius:10px;font-size:15px;box-sizing:border-box;outline:none}
input:focus{border-color:#C2A369}
button{margin-top:12px;width:100%;padding:12px;border:0;border-radius:10px;background:linear-gradient(135deg,#CBAD74,#A8894F);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#out{margin-top:16px;padding:14px;background:#F5F2EA;border-radius:10px;font-family:monospace;font-size:12px;word-break:break-all;min-height:20px;cursor:pointer}
.hint{font-size:11px;color:#8A9683;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <h1>🔐 สร้าง Password Hash</h1>
  <p>พิมพ์รหัสผ่านที่ต้องการ → กดสร้าง → ก๊อป hash ไปวางใน <b>dashboards.config.js</b> ช่อง <code>passwordHash</code></p>
  <input id="pw" type="text" placeholder="พิมพ์รหัสผ่านใหม่ที่นี่">
  <button onclick="gen()">สร้าง Hash</button>
  <div id="out" onclick="copyOut()" title="คลิกเพื่อคัดลอก"></div>
  <div class="hint">คลิกที่ hash เพื่อคัดลอก · ไฟล์นี้ทำงานในเครื่องเท่านั้น ไม่ส่งข้อมูลไปไหน</div>
</div>
<script>
async function gen(){
  const v = document.getElementById("pw").value;
  if(!v) return;
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
  document.getElementById("out").textContent =
    [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function copyOut(){
  const t = document.getElementById("out").textContent;
  if(t) navigator.clipboard.writeText(t).then(()=>alert("คัดลอกแล้ว ✓"));
}
</script>
</body>
</html>
